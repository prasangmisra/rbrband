version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rbrband_postgres_dev
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rbrband123
      POSTGRES_DB: rbrband
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
